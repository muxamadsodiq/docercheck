server {
    listen 80;
    server_name safar24.uz www.safar24.uz;

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /Users/muhammadsodiq/Downloads/keraksiz/safar24_server/safar24/static/;
    }

    location /uploads/ {
        alias /Users/muhammadsodiq/Downloads/keraksiz/safar24_server/safar24/static/uploads/;
    }

    client_max_body_size 20M;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name safar24.uz www.safar24.uz;

    ssl_certificate /etc/letsencrypt/live/safar24.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safar24.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /Users/muhammadsodiq/Downloads/keraksiz/safar24_server/safar24/static/;
    }

    location /uploads/ {
        alias /Users/muhammadsodiq/Downloads/keraksiz/safar24_server/safar24/static/uploads/;
    }

    client_max_body_size 20M;
}
