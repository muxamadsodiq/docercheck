version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: safar24:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./static/tickets:/app/static/tickets
      - ./safar24.db:/app/safar24.db
    environment:
      - PORT=5000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
